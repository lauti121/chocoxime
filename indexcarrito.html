<!-- ── PANEL FLOTANTE DEL CARRITO DE COMPRAS ── -->
<div id="cart-overlay" class="cart-overlay hidden">
  <div class="cart-sidebar">
    <div class="cart-header">
      <h3><i class="fas fa-shopping-bag"></i> Tu Carrito</h3>
      <button class="close-cart-btn" onclick="toggleCart()">&times;</button>
    </div>

    <!-- Contenedor dinámico donde JavaScript insertará los productos -->
    <div id="cart-items-list" class="cart-body">
      <!-- Se llena automáticamente desde app.js -->
    </div>

    <div class="cart-footer">
      <div class="cart-total-row">
        <span>Total estimado:</span>
        <span id="cart-total-display" class="cart-total-price">$0</span>
      </div>
      <p class="cart-legal-notice">Despachos calculados al finalizar la compra.</p>
      <button class="btn-primary btn-checkout" onclick="checkout()">
        <i class="fas fa-lock"></i> Finalizar Compra
      </button>
    </div>
  </div>
</div>
